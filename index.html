<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <header>
        <div>
            <h1>📊 CGPA Calculator</h1>
            <p class="subtitle">Study Smart, Calculate Easy ✨</p>
        </div>

        <div class="student-icon">
            👨‍🎓
        </div>
    </header>

    <h2>Select Semester 🎓</h2>

    <div class="semester-grid">
        <button class="semester-btn active">1-1</button>
        <button class="semester-btn">1-2</button>
        <button class="semester-btn">2-1</button>
        <button class="semester-btn">2-2</button>
        <button class="semester-btn">3-1</button>
        <button class="semester-btn">3-2</button>
        <button class="semester-btn">4-1</button>
        <button class="semester-btn">4-2</button>
    </div>

    <div class="action-buttons">
        <button id="addBtn">+ Add Subject</button>
        <button id="saveBtn">💾 Save Semester</button>
    </div>

    <!-- Subjects will appear here -->
    <div id="subjects"></div>

    <!-- SGPA Summary -->
    <div class="summary-card">
        <h3>📊 SGPA Summary</h3>
        <p>SGPA: <span id="sgpa">0.00</span></p>
        <p>Credits: <span id="credits">0</span></p>
        <p>Backlogs: <span id="backlogs">0</span></p>
    </div>

    <!-- CGPA Summary -->
    <div class="summary-card">
        <h3>🎯 CGPA Summary</h3>
        <p>CGPA: <span id="cgpa">0.00</span></p>
        <p>Percentage: <span id="percentage">0.00%</span></p>
    </div>

    <!-- Result -->
    <div class="summary-card distinction-card">
        <h3>🏆 Result</h3>
        <p id="result">---</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
