<div class="container">

  <header>
    <div>
      <h1>📊 CGPA Calculator</h1>
      <p>Study Smart, Calculate Easy ✨</p>
      <link rel="stylesheet" href="style.css">
    </div>

    <div class="student-icon">
      👨‍🎓
    </div>
  </header>

  <h2>Select Semester 🎓</h2>

  <div class="semester-grid">
    <button>1-1</button>
    <button>1-2</button>
    <button>2-1</button>
    <button>2-2</button>
    <button>3-1</button>
    <button>3-2</button>
    <button>4-1</button>
    <button>4-2</button>
  </div>

  <div class="action-buttons">
    <button id="addBtn">+ Add Subject</button>
    <button id="saveBtn">💾 Save Semester</button>
  </div>

  <div id="subjects">
    <!-- Subject rows appear here -->
  </div>

  <div class="summary-card">
    <h3>📊 SGPA Summary</h3>
    <p>SGPA: 0.00</p>
    <p>Credits: 0</p>
    <p>Backlogs: 0</p>
  </div>

  <div class="summary-card">
    <h3>🎯 CGPA Summary</h3>
    <p>CGPA: 0.00</p>
    <p>Percentage: 0%</p>
  </div>

</div>
